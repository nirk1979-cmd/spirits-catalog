<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIRITS PRO ISRAEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --shell-bg:#111113;
  --shell-bg2:#1a1a1d;
  --shell-bg3:#232327;
  --shell-line:rgba(255,255,255,0.09);
  --shell-ink:#f3f2ee;
  --shell-ink-dim:#9c9a93;
  --shell-accent:#c9a227;
  --font-display:'Frank Ruhl Libre', Georgia, serif;
  --font-body:'Rubik','Segoe UI',sans-serif;
  --radius:16px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--shell-bg); color:var(--shell-ink); font-family:var(--font-body);
  line-height:1.55; -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
.en{direction:ltr; unicode-bidi:isolate;}
::selection{background:var(--shell-accent); color:#141414;}
button{font-family:inherit;}

.appbar{
  position:sticky; top:0; z-index:80; backdrop-filter:blur(16px);
  background:rgba(17,17,19,0.78); border-bottom:1px solid var(--shell-line);
  padding:14px 20px;
}
.appbar-row{ max-width:960px; margin:0 auto; display:flex; align-items:center; gap:14px; }
.logo{ font-family:var(--font-display); font-size:19px; letter-spacing:.04em; white-space:nowrap; }
.logo b{ color:var(--shell-accent); font-weight:700; }
.logo span{ font-size:10px; letter-spacing:.24em; color:var(--shell-ink-dim); display:block; margin-top:-2px; }
.search-wrap{ flex:1; position:relative; }
.search-wrap input{
  width:100%; background:var(--shell-bg2); border:1px solid var(--shell-line); border-radius:30px;
  color:var(--shell-ink); padding:11px 44px 11px 16px; font-size:14px; font-family:var(--font-body);
  transition:.2s;
}
.search-wrap input:focus{ outline:none; border-color:var(--shell-accent); background:var(--shell-bg3); }
.search-wrap .sicon{ position:absolute; left:16px; top:50%; transform:translateY(-50%); opacity:.5; font-size:14px; }
.back-btn{
  background:var(--shell-bg2); border:1px solid var(--shell-line); color:var(--shell-ink);
  border-radius:20px; padding:9px 18px; font-size:13px; cursor:pointer; white-space:nowrap; display:none;
}
.back-btn.show{ display:inline-flex; align-items:center; gap:6px; }

.view{ max-width:960px; margin:0 auto; padding:30px 20px 90px; }
.view.hidden{ display:none; }

.greeting{ margin-bottom:22px; }
.greeting h1{ font-family:var(--font-display); font-size:clamp(26px,4vw,34px); font-weight:500; }
.greeting p{ color:var(--shell-ink-dim); font-size:14px; margin-top:6px; }

.chip-scroll{ display:flex; gap:10px; overflow-x:auto; padding:4px 2px 18px; scrollbar-width:none; }
.chip-scroll::-webkit-scrollbar{ display:none; }
.cat-chip{
  flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:6px;
  background:var(--shell-bg2); border:1px solid var(--shell-line); border-radius:18px;
  padding:14px 18px; cursor:pointer; transition:.2s; min-width:76px;
}
.cat-chip .ic{ font-size:22px; }
.cat-chip .lb{ font-size:11.5px; color:var(--shell-ink-dim); white-space:nowrap; }
.cat-chip.active{ border-color:var(--shell-accent); background:rgba(201,162,39,0.1); }
.cat-chip.active .lb{ color:var(--shell-accent); }

.section-title{ font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--shell-ink-dim); margin:28px 0 14px; }

.brand-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
.brand-tile{
  background:var(--shell-bg2); border:1px solid var(--shell-line); border-radius:var(--radius);
  padding:16px; cursor:pointer; transition:.2s; display:flex; flex-direction:column; gap:10px;
}
.brand-tile:hover{ transform:translateY(-3px); border-color:var(--tile-accent,var(--shell-accent)); }
.swatch{
  width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:17px;
}
.brand-tile .bname{ font-family:var(--font-display); font-size:16px; }
.brand-tile .bmeta{ font-size:11px; color:var(--shell-ink-dim); }
.tier-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; margin-left:5px; }

.empty-state{ text-align:center; padding:60px 20px; color:var(--shell-ink-dim); font-size:14px; }

.brand-page{
  background:var(--b-bg); color:var(--b-ink); border-radius:24px; overflow:hidden; margin-top:-6px;
  border:1px solid var(--b-line);
}
.brand-hero{
  padding:46px 30px 34px; position:relative;
  background:radial-gradient(ellipse 90% 70% at 20% -10%, var(--b-accent-soft), transparent 60%);
}
.brand-hero .mark{
  width:76px; height:76px; border-radius:22px; background:var(--b-accent); color:var(--b-mark-ink,#141414);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700;
  font-size:30px; margin-bottom:20px;
}
.brand-hero h2{ font-family:var(--font-display); font-size:clamp(28px,5vw,44px); font-weight:500; }
.brand-hero .house-cat{ margin-top:8px; font-size:13px; color:var(--b-ink-dim); }
.badges{ display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
.badge{ font-size:11px; padding:5px 12px; border-radius:20px; border:1px solid var(--b-line); color:var(--b-ink-dim); }
.badge.tier{ border-color:var(--b-accent); color:var(--b-accent); }

.brand-body{ padding:8px 30px 40px; }
.brand-note{ font-size:15px; line-height:1.7; color:var(--b-ink); max-width:560px; margin-bottom:26px; }
.facts-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:1px; background:var(--b-line); border:1px solid var(--b-line); border-radius:14px; overflow:hidden; margin-bottom:26px; }
.fact{ background:var(--b-bg2); padding:16px 18px; }
.fact .fk{ font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--b-ink-dim); margin-bottom:6px; }
.fact .fv{ font-size:14px; font-weight:500; }

.ask-somm-btn{
  background:var(--b-accent); color:var(--b-mark-ink,#141414); border:none; padding:13px 26px; border-radius:30px;
  font-weight:700; font-size:13.5px; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
}

.fab{
  position:fixed; bottom:22px; left:22px; z-index:90;
  background:var(--shell-accent); color:#161302; border:none; border-radius:50px; padding:14px 20px;
  font-weight:700; font-size:13px; cursor:pointer; box-shadow:0 10px 26px rgba(0,0,0,.55);
  display:flex; align-items:center; gap:9px;
}
.chat-overlay{
  position:fixed; inset:0; z-index:100; background:rgba(8,8,9,0.6); backdrop-filter:blur(4px);
  display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:.25s;
}
.chat-overlay.open{ opacity:1; pointer-events:auto; }
.chat-panel{
  width:100%; max-width:520px; background:var(--shell-bg2); border:1px solid var(--shell-line);
  border-radius:24px 24px 0 0; display:flex; flex-direction:column; height:78vh; max-height:640px;
  transform:translateY(20px); transition:.25s;
}
.chat-overlay.open .chat-panel{ transform:translateY(0); }
.chat-head{ padding:18px 22px; border-bottom:1px solid var(--shell-line); display:flex; justify-content:space-between; align-items:center; }
.chat-head h4{ font-family:var(--font-display); font-size:18px; color:var(--shell-accent); }
.chat-head button{ background:none; border:none; color:var(--shell-ink-dim); font-size:20px; cursor:pointer; }
.chat-log{ flex:1; overflow-y:auto; padding:20px 22px; display:flex; flex-direction:column; gap:14px; }
.msg{ max-width:85%; font-size:13.5px; line-height:1.6; padding:11px 15px; border-radius:14px; }
.msg.user{ align-self:flex-start; background:var(--shell-bg3); border:1px solid var(--shell-line); }
.msg.ai{ align-self:flex-end; background:rgba(201,162,39,0.1); border:1px solid rgba(201,162,39,0.35); }
.msg .tag{ display:block; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--shell-accent); margin-bottom:5px; }
.msg.typing{ align-self:flex-end; color:var(--shell-ink-dim); font-size:12.5px; }
.chat-input-row{ display:flex; gap:9px; padding:16px 20px; border-top:1px solid var(--shell-line); }
.chat-input-row input{ flex:1; background:var(--shell-bg); border:1px solid var(--shell-line); color:var(--shell-ink); padding:11px 15px; border-radius:20px; font-size:13.5px; }
.chat-input-row input:focus{ outline:none; border-color:var(--shell-accent); }
.chat-input-row button{ background:var(--shell-accent); color:#161302; border:none; padding:0 20px; border-radius:20px; font-weight:700; cursor:pointer; font-size:13px; }
.chat-input-row button:disabled{ opacity:.5; }

@media(max-width:560px){
  .appbar-row{ gap:8px; }
  .logo span{ display:none; }
  .view{ padding:22px 14px 90px; }
}
</style>
</head>
<body>

<header class="appbar">
  <div class="appbar-row">
    <div class="logo"><b>SPIRITS</b> PRO<span>ISRAEL EDITION</span></div>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="חפשו מותג, קטגוריה או בית...">
      <span class="sicon">🔍</span>
    </div>
    <button class="back-btn" id="backBtn">→ חזרה</button>
  </div>
</header>

<main>
  <section class="view" id="viewHome">
    <div class="greeting">
      <h1>ערב טוב 👋</h1>
      <p>מאגר המותגים המקצועי של Diageo × Gruppo Campari — לחצו על מותג לעיצוב ייחודי ומידע מלא.</p>
    </div>
    <div class="chip-scroll" id="catChips"></div>
    <div class="section-title" id="gridTitle">כל המותגים</div>
    <div class="brand-grid" id="brandGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">לא נמצאו מותגים תואמים לחיפוש.</div>
  </section>

  <section class="view hidden" id="viewBrand"></section>
</main>

<button class="fab" id="fabBtn">🥃 שאל את הסומלייה</button>

<div class="chat-overlay" id="chatOverlay">
  <div class="chat-panel">
    <div class="chat-head">
      <h4>הסומלייה הדיגיטלי</h4>
      <button id="chatClose">✕</button>
    </div>
    <div class="chat-log" id="chatLog">
      <div class="msg ai"><span class="tag">Sommelier</span>שלום! שאלו אותי על כל מותג, קטגוריה או המלצה מקצועית.</div>
    </div>
    <div class="chat-input-row">
      <input id="chatInput" type="text" placeholder="שאלו אותי משהו...">
      <button id="chatSend">שלח</button>
    </div>
  </div>
</div>

let activeCat = "all";

const catChips = document.getElementById('catChips');
function renderChips(){
  catChips.innerHTML = '';
  const allChip = document.createElement('div');
  allChip.className = 'cat-chip' + (activeCat==='all' ? ' active' : '');
  allChip.innerHTML = `<span class="ic">✨</span><span class="lb">הכל</span>`;
  allChip.onclick = ()=>{ activeCat='all'; renderChips(); renderGrid(); };
  catChips.appendChild(allChip);
  CATEGORIES.forEach(c=>{
    const el = document.createElement('div');
    el.className = 'cat-chip' + (activeCat===c.key ? ' active' : '');
    el.innerHTML = `<span class="ic">${c.ic}</span><span class="lb">${c.lb}</span>`;
    el.onclick = ()=>{ activeCat = c.key; renderChips(); renderGrid(); };
    catChips.appendChild(el);
  });
}
renderChips();

const brandGrid = document.getElementById('brandGrid');
const emptyState = document.getElementById('emptyState');
const gridTitle = document.getElementById('gridTitle');
const searchInput = document.getElementById('searchInput');

function renderGrid(){
  const q = searchInput.value.trim().toLowerCase();
  let list = BRANDS.filter(b=>{
    const catMatch = activeCat==='all' || b.cat===activeCat;
    const qMatch = !q || b.name.toLowerCase().includes(q) || b.cat.toLowerCase().includes(q) || b.house.toLowerCase().includes(q) || b.note.includes(q);
    return catMatch && qMatch;
  });
  gridTitle.textContent = q ? `תוצאות עבור "${searchInput.value}"` : (activeCat==='all' ? 'כל המותגים' : (CATEGORIES.find(c=>c.key===activeCat)||{}).lb || 'מותגים');
  brandGrid.innerHTML = '';
  emptyState.style.display = list.length ? 'none' : 'block';
  list.forEach(b=>{
    const tile = document.createElement('div');
    tile.className = 'brand-tile';
    tile.style.setProperty('--tile-accent', b.th.accent);
    tile.innerHTML = `
      <div class="swatch" style="background:${b.th.accent}; color:${b.th.markInk}">${b.name[0]}</div>
      <div class="bname en">${b.name}</div>
      <div class="bmeta">${b.house} · ${b.cat}<span class="tier-dot" style="background:${TIER_COLOR[b.tier]}"></span>${TIER_LABEL[b.tier]}</div>
    `;
    tile.onclick = ()=> openBrand(b);
    brandGrid.appendChild(tile);
  });
}
searchInput.addEventListener('input', renderGrid);
renderGrid();

const viewHome = document.getElementById('viewHome');
const viewBrand = document.getElementById('viewBrand');
const backBtn = document.getElementById('backBtn');

function openBrand(b){
  const th = b.th;
  const accentSoft = th.accent + '33';
  viewBrand.innerHTML = `
    <div class="brand-page" style="--b-bg:${th.bg}; --b-bg2:${th.bg2}; --b-accent:${th.accent}; --b-accent-soft:${accentSoft}; --b-ink:${th.ink}; --b-ink-dim:${th.inkDim}; --b-line:${th.ink}22; --b-mark-ink:${th.markInk};">
      <div class="brand-hero">
        <div class="mark en">${b.name[0]}</div>
        <h2 class="en">${b.name}</h2>
        <div class="house-cat">${b.house} · ${b.cat}</div>
        <div class="badges">
          <span class="badge tier">${TIER_LABEL[b.tier]}</span>
          <span class="badge">${b.house}</span>
          <span class="badge">${b.cat}</span>
        </div>
      </div>
      <div class="brand-body">
        <p class="brand-note">${b.note}</p>
        <div class="facts-grid">
          <div class="fact"><div class="fk">בית</div><div class="fv">${b.house}</div></div>
          <div class="fact"><div class="fk">קטגוריה</div><div class="fv">${b.cat}</div></div>
          <div class="fact"><div class="fk">מיצוב</div><div class="fv">${TIER_LABEL[b.tier]}</div></div>
          <div class="fact"><div class="fk">הגשה מומלצת</div><div class="fv">${b.serve}</div></div>
        </div>
        <button class="ask-somm-btn" id="askAboutBrand">🥃 שאל את הסומלייה על ${b.name}</button>
      </div>
    </div>
  `;
  document.getElementById('askAboutBrand').onclick = ()=>{
    openChat();
    sendMessage(`ספר לי עוד על ${b.name} ותן לי נימוקי מכירה קצרים`);
  };
  viewHome.classList.add('hidden');
  viewBrand.classList.remove('hidden');
  backBtn.classList.add('show');
  window.scrollTo(0,0);
}

backBtn.addEventListener('click', ()=>{
  viewBrand.classList.add('hidden');
  viewHome.classList.remove('hidden');
  backBtn.classList.remove('show');
  window.scrollTo(0,0);
});

const CATALOG_CONTEXT = `נתוני קטלוג: ${BRANDS.map(b=>`${b.name} (בית: ${b.house}, קטגוריה: ${b.cat}, מיצוב: ${TIER_LABEL[b.tier]}, הגשה: ${b.serve})`).join('; ')}`;
const SYSTEM_PROMPT = `את/ה "הסומלייה הדיגיטלי" של אפליקציית SPIRITS PRO ISRAEL (Diageo × Gruppo Campari), מיועד לאנשי מכירות, ברמנים ויבואנים בישראל.
ענה/י תמיד בעברית, בטון מקצועי, חם ותכליתי. תשובות קצרות וממוקדות (2-5 משפטים או רשימת נקודות).
אם נשאלת שאלה שאינה קשורה לתחום המשקאות/מכירה, הפנה בנימוס חזרה לנושא.
אל תמציא נתוני מחיר או אחוזי אלכוהול מדויקים שלא סופקו — דבר/י במונחים איכותיים.
${CATALOG_CONTEXT}`;

let chatHistory = [];
const chatOverlay = document.getElementById('chatOverlay');
const chatLog = document.getElementById('chatLog');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');

function openChat(){ chatOverlay.classList.add('open'); }
function closeChat(){ chatOverlay.classList.remove('open'); }
document.getElementById('fabBtn').addEventListener('click', openChat);
document.getElementById('chatClose').addEventListener('click', closeChat);
chatOverlay.addEventListener('click', e=>{ if(e.target===chatOverlay) closeChat(); });

function addMsg(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + (role==='user' ? 'user' : 'ai');
  div.innerHTML = `<span class="tag">${role==='user' ? 'את/ה' : 'Sommelier'}</span>${text.replace(/</g,'&lt;')}`;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

async function sendMessage(text){
  if(!text || !text.trim()) return;
  addMsg('user', text);
  chatHistory.push({role:'user', content:text});
  chatInput.value='';
  chatSend.disabled = true;
  const typing = document.createElement('div');
  typing.className = 'msg typing';
  typing.textContent = 'הסומלייה חושב/ת...';
  chatLog.appendChild(typing);
  chatLog.scrollTop = chatLog.scrollHeight;
  try{
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: SYSTEM_PROMPT, messages: chatHistory })
    });
    const data = await response.json();
    typing.remove();
    if(data.error){ addMsg('ai', 'שגיאה: ' + data.error); chatSend.disabled=false; return; }
    const reply = (data.text || '').trim() || 'לא הצלחתי לענות כרגע, נסו שוב.';
    addMsg('ai', reply);
    chatHistory.push({role:'assistant', content: reply});
  }catch(err){
    typing.remove();
    addMsg('ai', 'שגיאת תקשורת. נסו שוב בעוד רגע.');
    console.error(err);
  }finally{
    chatSend.disabled = false;
  }
}
chatSend.addEventListener('click', ()=> sendMessage(chatInput.value));
chatInput.addEventListener('keydown', e=>{ if(e.key==='Enter') sendMessage(chatInput.value); });
</script>
